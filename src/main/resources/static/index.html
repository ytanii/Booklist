<!DOCTYPE html>
<html lang="en">
<head>
    <title>Book Search</title>
</head>
<body>
<h1>Book Search</h1>
<input type="text" id="searchQuery" placeholder="Type Book Title or Author">
<button id="searchBtn">Search</button>

<ul id="results"></ul>
<script>
    const searchBtn = document.getElementById("searchBtn");
    const searchQuery = document.getElementById("searchQuery");
    const resultsList = document.getElementById("results");

    searchBtn.addEventListener("click", () => {
        triggerSearch();
    });

    searchQuery.addEventListener('keydown', function (event){
        if(event.key === 'Enter'){
            triggerSearch();
        }
    })



    function triggerSearch() {
        const query = searchQuery.value.trim();
        if (!query) {
            return;
        }


        resultsList.innerHTML = '';
        fetch(`/books/search?q=${encodeURIComponent(query)}`)
            .then(response => response.json())
            .then(data => {
                if (data.length === 0) {
                    resultsList.innerHTML = '<li>No results found</li>';
                    return;
                }
                data.forEach(book => {
                    const li = document.createElement('li');
                    li.textContent = book;
                    resultsList.appendChild(li);
                });
            })
            .catch(err => {
                console.error(err);
                resultsList.innerHTML = '<li>Error fetching results</li>'
            });
    }
</script>
</body>
</html>
